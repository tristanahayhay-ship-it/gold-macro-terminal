[theme]
primaryColor = "#eab308"      # Màu vàng Gold chủ đạo cho các nút bấm và highlight
backgroundColor = "#0b0f19"   # Màu nền xanh đen đậm chất tài chính của Bloomberg/TradingView
secondaryBackgroundColor = "#111827" # Màu nền sidebar và các khối thẻ bài viết
textColor = "#f3f4f6"         # Màu chữ trắng xám dịu mắt, không gây mỏi
font = "sans serif"
